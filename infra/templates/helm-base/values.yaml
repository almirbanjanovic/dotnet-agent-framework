# =============================================================================
# Default values for a Contoso Outdoors .NET 9 microservice
# =============================================================================
# Override these per service in a values-<service>.yaml or via --set flags.
# See infra/templates/README.md for usage instructions.

# -- Container image configuration
image:
  repository: contosoacr.azurecr.io/service-name
  tag: ""  # Defaults to Chart.appVersion if empty
  pullPolicy: IfNotPresent

imagePullSecrets: []

# -- Replica count (overridden by HPA when enabled)
replicaCount: 1

# -- Service account configuration
# Service accounts are pre-provisioned by Terraform in the 'contoso' namespace
# with Azure Workload Identity annotations. Set create=false (default) to
# reference the Terraform-managed SA; set create=true only for local/test clusters.
serviceAccount:
  create: false
  name: ""  # Required — e.g., sa-crm-api, sa-bff, sa-crm-agent
  annotations: {}
  # When create=true, these annotations are applied:
  #   azure.workload.identity/client-id: "<managed-identity-client-id>"

# -- Azure Workload Identity
# Enables the azure.workload.identity/use label on the pod spec.
# Required for OIDC token exchange with Azure managed identities.
workloadIdentity:
  enabled: true

# -- Pod-level settings
podAnnotations: {}
podLabels: {}

# -- Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 8080  # .NET 9 default non-root port

# -- Ingress configuration (disabled by default — AGC handles external routing)
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: azure-application-gateway
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: service-name.contoso.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: service-name-tls
  #    hosts:
  #      - service-name.contoso.local

# -- Resource requests and limits
# Tuned for .NET 9 Minimal API services on AKS workload node pool.
# Adjust per service based on profiling; these are conservative defaults.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# -- Health probes
# All .NET services must implement /health (liveness) and /ready (readiness).
# See decisions.md: "Health check endpoints must be added to CRM API and BFF API"
probes:
  liveness:
    path: /health
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /ready
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

# -- Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# -- Security context (pod-level)
# Enforces restricted pod security standard required by AKS.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1654       # 'app' user from aspnet:9.0 image
  runAsGroup: 1654
  fsGroup: 1654
  seccompProfile:
    type: RuntimeDefault

# -- Security context (container-level)
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1654
  capabilities:
    drop:
      - ALL

# -- ConfigMap values (non-secret configuration)
# These are mounted as environment variables via a ConfigMap.
config: {}
  # ASPNETCORE_ENVIRONMENT: "Production"
  # ASPNETCORE_URLS: "http://+:8080"
  # Logging__LogLevel__Default: "Information"

# -- Secret references
# Reference existing Kubernetes secrets (e.g., synced from Key Vault via CSI driver).
# These are NOT created by the chart — they must exist in the namespace.
secretRefs: []
  # - name: keyvault-secrets
  #   keys:
  #     - key: CosmosDb__Endpoint
  #       envVar: COSMOSDB_ENDPOINT

# -- Node selector, tolerations, and affinity
# Use these to schedule pods on the AKS workload node pool.
nodeSelector: {}
  # agentpool: workload

tolerations: []

affinity: {}

# -- Namespace override (defaults to release namespace, typically 'contoso')
namespaceOverride: ""
