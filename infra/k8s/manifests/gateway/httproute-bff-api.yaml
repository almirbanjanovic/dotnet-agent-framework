# =============================================================================
# HTTPRoute — BFF API (/api/*)
# =============================================================================
# Forwards /api/* to the BFF API Service (port 80 → pod port 8080, see
# src/bff-api/chart/values.yaml). HTTPRoute matching is "longest prefix wins",
# so this rule takes precedence over the catch-all blazor-ui route for /api/*
# requests.
#
# The BFF validates the OAuth bearer token MSAL issues to the Blazor UI
# (scope api://<bff_client_id>/access_as_user — see infra/terraform/modules/
# entra/v1/main.tf), so traffic that reaches this Service is already
# authenticated.
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bff-api
  namespace: contoso
spec:
  parentRefs:
    - name: contoso-gateway
      namespace: contoso
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: bff-api
          port: 80
