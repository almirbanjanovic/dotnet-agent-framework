# NetworkPolicy for crm-api
# Ingress: crm-mcp, bff-api, and fraud-workflow (refund-decision callback)
# Egress:  Cosmos DB + Key Vault (port 443 via PE), DNS, fraud-workflow (refund-alert trigger)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-crm-api
  namespace: contoso
  labels:
    app.kubernetes.io/part-of: contoso-outdoors
    app.kubernetes.io/managed-by: kubectl
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: crm-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: crm-mcp
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: bff-api
        # fraud-workflow callback into POST /api/v1/internal/tickets/{id}/refund-decision
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: fraud-workflow
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS resolution (kube-dns)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # fraud-workflow (refund-alert trigger when a category=return ticket is created)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: fraud-workflow
      ports:
        - protocol: TCP
          port: 8080
    # Azure PaaS via private endpoints (Cosmos DB, Key Vault)
    - to:
        - ipBlock:
            cidr: 10.0.3.0/24
      ports:
        - protocol: TCP
          port: 443
