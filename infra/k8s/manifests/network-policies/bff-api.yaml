# NetworkPolicy for bff-api
# Ingress: AGC ingress controller (azure-alb-system namespace)
# Egress:  orchestrator-agent (port 8080), crm-api (port 8080), Azure PaaS (port 443 via PE), DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-bff-api
  namespace: contoso
  labels:
    app.kubernetes.io/part-of: contoso-outdoors
    app.kubernetes.io/managed-by: kubectl
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: bff-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from AGC (Application Gateway for Containers)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: azure-alb-system
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS resolution (kube-dns)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # orchestrator-agent (downstream — agent chat path)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: orchestrator-agent
      ports:
        - protocol: TCP
          port: 8080
    # crm-api (downstream — direct data path for UI proxy)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: crm-api
      ports:
        - protocol: TCP
          port: 8080
    # Azure PaaS via private endpoints (Cosmos DB, Blob Storage, Key Vault)
    - to:
        - ipBlock:
            cidr: 10.0.3.0/24
      ports:
        - protocol: TCP
          port: 443
