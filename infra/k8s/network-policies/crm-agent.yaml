# NetworkPolicy for crm-agent
# Ingress: orchestrator-agent only
# Egress:  crm-mcp (port 8080), Azure OpenAI + Key Vault (port 443 via PE), DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-crm-agent
  namespace: contoso
  labels:
    app.kubernetes.io/part-of: contoso-outdoors
    app.kubernetes.io/managed-by: kubectl
spec:
  podSelector:
    matchLabels:
      app: crm-agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: orchestrator-agent
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS resolution (kube-dns)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # crm-mcp (downstream)
    - to:
        - podSelector:
            matchLabels:
              app: crm-mcp
      ports:
        - protocol: TCP
          port: 8080
    # Azure PaaS via private endpoints (Azure OpenAI, Key Vault)
    - to:
        - ipBlock:
            cidr: 10.0.3.0/24
      ports:
        - protocol: TCP
          port: 443
