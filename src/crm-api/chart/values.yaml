# =============================================================================
# Values for Contoso CRM API
# =============================================================================

image:
  repository: contosoacr.azurecr.io/crm-api
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

serviceAccount:
  create: false
  name: "sa-crm-api"
  annotations: {}

workloadIdentity:
  enabled: true

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: crm-api.contoso.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 250m
    memory: 512Mi

probes:
  liveness:
    path: /health
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /ready
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1654
  runAsGroup: 1654
  fsGroup: 1654
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1654
  capabilities:
    drop:
      - ALL

config:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  CosmosDb__DatabaseName: "contoso-crm"
  Logging__LogLevel__Default: "Information"
  Logging__LogLevel__Microsoft.AspNetCore: "Warning"
  Logging__LogLevel__Microsoft.Azure.Cosmos: "Warning"

secretRefs: []
  # - name: keyvault-secrets
  #   keys:
  #     - key: CosmosDb__Endpoint
  #       envVar: CosmosDb__Endpoint
  #     - key: AzureAd__TenantId
  #       envVar: AzureAd__TenantId

nodeSelector: {}

tolerations: []

affinity: {}

namespaceOverride: ""
