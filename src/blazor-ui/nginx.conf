worker_processes  auto;

# PID file lives under /tmp because /var/run is read-only when the
# container is started with readOnlyRootFilesystem=true.
pid /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Required so nginx can run unprivileged on AKS pods (UID 101).
    # The PID file lives under /tmp because /var/run is read-only when
    # the container is started with readOnlyRootFilesystem=true.
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_types
        application/javascript
        application/json
        application/wasm
        application/xml
        text/css
        text/html
        text/plain;

    # Brotli is ideal for Blazor WASM but the alpine base image doesn't
    # ship with it. Gzip is good enough for the workshop-scale traffic.

    server {
        listen       8080;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # Long cache for fingerprinted static assets.
        location /_framework/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Health probe used by Kubernetes.
        location = /health {
            access_log off;
            return 200 "ok\n";
            default_type text/plain;
        }

        # SPA fallback — serve index.html for any path the client
        # routes to in-browser.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Prevent serving source maps and other dev-only artifacts.
        location ~ \.map$ {
            return 404;
        }
    }
}
