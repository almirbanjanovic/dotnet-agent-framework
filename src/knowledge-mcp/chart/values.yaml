# =============================================================================
# Values for Contoso Knowledge MCP server
# =============================================================================

image:
  repository: contosoacr.azurecr.io/knowledge-mcp
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

serviceAccount:
  create: false
  name: "sa-know-mcp"
  annotations: {}

workloadIdentity:
  enabled: true

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: knowledge-mcp.contoso.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 150m
    memory: 384Mi
  limits:
    cpu: 500m
    memory: 768Mi

probes:
  liveness:
    path: /health
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /ready
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1654
  runAsGroup: 1654
  fsGroup: 1654
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1654
  capabilities:
    drop:
      - ALL

config:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  DataMode: "AzureSearch"
  # Index name MUST match what Terraform creates. The knowledge-source module
  # produces "<var.search_index_name>-index" (see
  # infra/terraform/modules/knowledge-source/v1/outputs.tf). With
  # search_index_name="knowledge-documents" in dev.tfvars the resulting AI
  # Search index is "knowledge-documents-index".
  Search__IndexName: "knowledge-documents-index"
  Logging__LogLevel__Default: "Information"
  Logging__LogLevel__Microsoft.AspNetCore: "Warning"

secretRefs:
  - name: keyvault-secrets
    keys:
      - key: AzureAd--TenantId
        envVar: AzureAd__TenantId
      - key: Search--Endpoint
        envVar: Search__Endpoint
      - key: Foundry--Endpoint
        envVar: Foundry__Endpoint
      - key: Foundry--EmbeddingDeploymentName
        envVar: Foundry__EmbeddingDeploymentName

nodeSelector: {}

tolerations: []

affinity: {}

namespaceOverride: ""
