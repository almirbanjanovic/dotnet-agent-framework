# =============================================================================
# Values for Contoso Product Agent
# =============================================================================
# Authenticates to Azure AI Foundry as an Entra Agent ID via workload-identity
# federation. The service account `sa-prod-agent` is provisioned by Terraform
# with the appropriate federated credential.
# =============================================================================

image:
  repository: contosoacr.azurecr.io/product-agent
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

serviceAccount:
  create: false
  name: "sa-prod-agent"
  annotations: {}

workloadIdentity:
  enabled: true

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: product-agent.contoso.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    cpu: 750m
    memory: 1Gi

probes:
  liveness:
    path: /health
    port: 8080
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /ready
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1654
  runAsGroup: 1654
  fsGroup: 1654
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1654
  capabilities:
    drop:
      - ALL

config:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  CrmMcp__BaseUrl: "http://crm-mcp"
  KnowledgeMcp__BaseUrl: "http://knowledge-mcp"
  Logging__LogLevel__Default: "Information"
  Logging__LogLevel__Microsoft.AspNetCore: "Warning"

secretRefs:
  - name: keyvault-secrets
    keys:
      - key: AzureAd--TenantId
        envVar: AzureAd__TenantId
      - key: Foundry--ProjectEndpoint
        envVar: Foundry__ProjectEndpoint
      - key: Foundry--DeploymentName
        envVar: Foundry__DeploymentName
      - key: Foundry--ToolboxName
        envVar: Foundry__ToolboxName

nodeSelector: {}

tolerations: []

affinity: {}

namespaceOverride: ""
