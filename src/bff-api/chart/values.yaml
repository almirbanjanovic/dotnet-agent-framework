# =============================================================================
# Values for Contoso BFF API
# =============================================================================

image:
  repository: contosoacr.azurecr.io/bff-api
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

serviceAccount:
  create: false
  name: "sa-bff"
  annotations: {}

workloadIdentity:
  enabled: true

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: bff-api.contoso.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi

probes:
  liveness:
    path: /health
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /ready
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1654
  runAsGroup: 1654
  fsGroup: 1654
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1654
  capabilities:
    drop:
      - ALL

config:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  # Browser CORS allowlist for the Blazor SPA. In production both UI and BFF
  # are served from the same AGC frontend FQDN, so requests are technically
  # same-origin and CORS isn't consulted — but this value MUST still be the
  # actual production hostname so any future cross-origin scenario (split
  # domains, custom UI host, debugging from a workstation) does not silently
  # leak the wrong allowlist. Both the per-service deploy workflow
  # (.github/workflows/deploy-bff-api.yml) and the tier-5 step in
  # .github/workflows/deploy-all-services.yml read the AGC FQDN from the
  # `Bff--Hostname` Key Vault secret and override this via
  # `--set config.BlazorUi__Origin=https://<agc-fqdn>`. The sentinel below
  # is intentionally invalid so a forgotten override is loud, not silent.
  BlazorUi__Origin: "https://override-via-helm-set"
  CrmApi__BaseUrl: "http://crm-api"
  Orchestrator__BaseUrl: "http://orchestrator-agent"
  # Database name MUST match Terraform's `cosmos_agents_database_name` (see
  # infra/terraform/dev.tfvars). Currently "agents".
  CosmosDb__AgentsDatabase: "agents"
  CosmosDb__AgentsContainer: "conversations"
  Logging__LogLevel__Default: "Information"
  Logging__LogLevel__Microsoft.AspNetCore: "Warning"

secretRefs:
  - name: keyvault-secrets
    keys:
      - key: AzureAd--TenantId
        envVar: AzureAd__TenantId
      - key: AzureAd--BffClientId
        envVar: AzureAd__BffClientId
      - key: CosmosDb--AgentsEndpoint
        envVar: CosmosDb__AgentsEndpoint
      - key: Storage--ImagesEndpoint
        envVar: Storage__ImagesEndpoint
      - key: Storage--ImagesContainer
        envVar: Storage__ImagesContainer

nodeSelector: {}

tolerations: []

affinity: {}

namespaceOverride: ""
