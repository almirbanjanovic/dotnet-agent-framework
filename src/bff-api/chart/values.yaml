# =============================================================================
# Values for Contoso BFF API
# =============================================================================

image:
  repository: contosoacr.azurecr.io/bff-api
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

serviceAccount:
  create: false
  name: "sa-bff"
  annotations: {}

workloadIdentity:
  enabled: true

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: bff-api.contoso.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi

probes:
  liveness:
    path: /health
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /ready
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1654
  runAsGroup: 1654
  fsGroup: 1654
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1654
  capabilities:
    drop:
      - ALL

config:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  BlazorUi__Origin: "https://blazor-ui.contoso.local"
  CrmApi__BaseUrl: "http://crm-api"
  Orchestrator__BaseUrl: "http://orchestrator-agent"
  CosmosDb__AgentsDatabase: "contoso-agents"
  CosmosDb__AgentsContainer: "conversations"
  Logging__LogLevel__Default: "Information"
  Logging__LogLevel__Microsoft.AspNetCore: "Warning"

secretRefs:
  - name: keyvault-secrets
    keys:
      - key: AzureAd--TenantId
        envVar: AzureAd__TenantId
      - key: AzureAd--BffClientId
        envVar: AzureAd__BffClientId
      - key: CosmosDb--AgentsEndpoint
        envVar: CosmosDb__AgentsEndpoint
      - key: Storage--ImagesEndpoint
        envVar: Storage__ImagesEndpoint

nodeSelector: {}

tolerations: []

affinity: {}

namespaceOverride: ""
