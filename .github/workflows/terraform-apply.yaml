on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      azureClientId:
        required: true
      azureTenantId:
        required: true
      azureSubscriptionId:
        required: true

env:
  TF_VAR_tags: ${{ vars.TAGS }}
  TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP }}
  TF_VAR_environment: ${{ vars.ENVIRONMENT }}
  TF_VAR_location: ${{ vars.LOCATION }}
  TF_VAR_iteration: ${{ vars.ITERATION }}
  # Foundry
  TF_VAR_cognitive_account_kind: ${{ vars.COGNITIVE_ACCOUNT_KIND }}
  TF_VAR_oai_sku_name: ${{ vars.OAI_SKU_NAME }}
  TF_VAR_oai_deployment_sku_name: ${{ vars.OAI_DEPLOYMENT_SKU_NAME }}
  TF_VAR_oai_deployment_model_format: ${{ vars.OAI_DEPLOYMENT_MODEL_FORMAT }}
  TF_VAR_oai_deployment_model_name: ${{ vars.OAI_DEPLOYMENT_MODEL_NAME }}
  TF_VAR_oai_deployment_model_version: ${{ vars.OAI_DEPLOYMENT_MODEL_VERSION }}
  TF_VAR_oai_version_upgrade_option: ${{ vars.OAI_VERSION_UPGRADE_OPTION }}
  TF_VAR_create_embedding_deployment: ${{ vars.CREATE_EMBEDDING_DEPLOYMENT }}
  TF_VAR_embedding_model_name: ${{ vars.EMBEDDING_MODEL_NAME }}
  TF_VAR_embedding_model_version: ${{ vars.EMBEDDING_MODEL_VERSION }}
  TF_VAR_embedding_sku_name: ${{ vars.EMBEDDING_SKU_NAME }}
  TF_VAR_embedding_capacity: ${{ vars.EMBEDDING_CAPACITY }}
  # Cosmos DB
  TF_VAR_cosmos_project_name: ${{ vars.COSMOS_PROJECT_NAME }}
  TF_VAR_cosmos_iteration: ${{ vars.COSMOS_ITERATION }}
  TF_VAR_cosmos_database_name: ${{ vars.COSMOS_DATABASE_NAME }}
  TF_VAR_cosmos_agent_state_container_name: ${{ vars.COSMOS_AGENT_STATE_CONTAINER_NAME }}
  # ACR
  TF_VAR_acr_project_name: ${{ vars.ACR_PROJECT_NAME }}
  TF_VAR_create_acr: ${{ vars.CREATE_ACR }}
  TF_VAR_acr_sku: ${{ vars.ACR_SKU }}
  TF_VAR_existing_acr_name: ${{ vars.EXISTING_ACR_NAME }}
  # AKS
  TF_VAR_aks_kubernetes_version: ${{ vars.AKS_KUBERNETES_VERSION }}
  TF_VAR_aks_node_vm_size: ${{ vars.AKS_NODE_VM_SIZE }}
  TF_VAR_aks_node_count: ${{ vars.AKS_NODE_COUNT }}
  TF_VAR_aks_auto_scaling_enabled: ${{ vars.AKS_AUTO_SCALING_ENABLED }}
  TF_VAR_aks_node_min_count: ${{ vars.AKS_NODE_MIN_COUNT }}
  TF_VAR_aks_node_max_count: ${{ vars.AKS_NODE_MAX_COUNT }}
  TF_VAR_aks_os_disk_size_gb: ${{ vars.AKS_OS_DISK_SIZE_GB }}
  TF_VAR_aks_log_retention_days: ${{ vars.AKS_LOG_RETENTION_DAYS }}

jobs: 
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment}}

    defaults:
        run:
          shell: bash

    steps:

    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Login to Azure using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.azureClientId }}
        tenant-id: ${{ secrets.azureTenantId }}
        subscription-id: ${{ secrets.azureSubscriptionId }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Enable public access for backend storage account
      run: |
        az storage account update \
        --name "${{ vars.STORAGE_ACCOUNT }}" \
        --resource-group "${{ vars.RESOURCE_GROUP }}" \
        --public-network-access Enabled

        # Wait for 10 seconds
        echo "Enabling public network access and waiting for 10 seconds."
        sleep 10
        

    - name: Terraform Init
      id: init
      run: |
        terraform -chdir="${{ vars.TERRAFORM_WORKING_DIRECTORY }}" init \
        -backend-config="resource_group_name=${{ vars.RESOURCE_GROUP }}" \
        -backend-config="storage_account_name=${{ vars.STORAGE_ACCOUNT }}" \
        -backend-config="container_name=${{ vars.TERRAFORM_STATE_CONTAINER }}" \
        -backend-config="key=${{ vars.TERRAFORM_STATE_BLOB }}"
      env:
        ARM_CLIENT_ID: ${{ secrets.azureClientId }}
        ARM_TENANT_ID: ${{ secrets.azureTenantId }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.azureSubscriptionId }}
        ARM_USE_OIDC: true
        ARM_USE_AZUREAD: true

    - name: Download the plan
      uses: actions/download-artifact@v4
      with:
        name: tf-plan
        path: ${{ vars.TERRAFORM_WORKING_DIRECTORY }}/

    - name: Apply the plan
      id: apply
      run: terraform -chdir="${{ vars.TERRAFORM_WORKING_DIRECTORY }}" apply -auto-approve out.tfplan
      env:
        ARM_CLIENT_ID: ${{ secrets.azureClientId }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.azureSubscriptionId }}
        ARM_TENANT_ID: ${{ secrets.azureTenantId }}
        ARM_USE_OIDC: true
        ARM_USE_AZUREAD: true

    - name: Disable public access for backend storage account
      if: always()
      run: |
        az storage account update \
        --name "${{ vars.STORAGE_ACCOUNT }}" \
        --resource-group "${{ vars.RESOURCE_GROUP }}" \
        --public-network-access Disabled