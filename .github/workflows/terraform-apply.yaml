on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      azureClientId:
        required: true
      azureTenantId:
        required: true
      azureSubscriptionId:
        required: true

env:
  TF_VAR_tags: ${{ vars.TAGS }}
  TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP }}
  TF_VAR_environment: ${{ vars.ENVIRONMENT }}
  TF_VAR_base_name: ${{ vars.BASE_NAME }}
  TF_VAR_location: ${{ vars.LOCATION }}
  # Foundry
  TF_VAR_cognitive_account_kind: ${{ vars.COGNITIVE_ACCOUNT_KIND }}
  TF_VAR_oai_sku_name: ${{ vars.OAI_SKU_NAME }}
  TF_VAR_oai_deployment_sku_name: ${{ vars.OAI_DEPLOYMENT_SKU_NAME }}
  TF_VAR_oai_deployment_model_format: ${{ vars.OAI_DEPLOYMENT_MODEL_FORMAT }}
  TF_VAR_oai_deployment_model_name: ${{ vars.OAI_DEPLOYMENT_MODEL_NAME }}
  TF_VAR_oai_deployment_model_version: ${{ vars.OAI_DEPLOYMENT_MODEL_VERSION }}
  TF_VAR_oai_version_upgrade_option: ${{ vars.OAI_VERSION_UPGRADE_OPTION }}
  TF_VAR_create_embedding_deployment: ${{ vars.CREATE_EMBEDDING_DEPLOYMENT }}
  TF_VAR_embedding_model_name: ${{ vars.EMBEDDING_MODEL_NAME }}
  TF_VAR_embedding_model_version: ${{ vars.EMBEDDING_MODEL_VERSION }}
  TF_VAR_embedding_sku_name: ${{ vars.EMBEDDING_SKU_NAME }}
  TF_VAR_embedding_capacity: ${{ vars.EMBEDDING_CAPACITY }}
  # Cosmos DB
  TF_VAR_cosmos_agents_database_name: ${{ vars.COSMOS_AGENTS_DATABASE_NAME }}
  TF_VAR_cosmos_agent_state_container_name: ${{ vars.COSMOS_AGENT_STATE_CONTAINER_NAME }}
  # Azure SQL Database
  TF_VAR_sql_database_name: ${{ vars.SQL_DATABASE_NAME }}
  TF_VAR_sql_admin_login: ${{ vars.SQL_ADMIN_LOGIN }}
  # Storage
  # AI Search
  TF_VAR_search_sku: ${{ vars.SEARCH_SKU }}
  TF_VAR_search_index_name: ${{ vars.SEARCH_INDEX_NAME }}
  # ACR
  TF_VAR_create_acr: ${{ vars.CREATE_ACR }}
  TF_VAR_acr_sku: ${{ vars.ACR_SKU }}
  TF_VAR_acr_name: ${{ vars.ACR_NAME }}
  # AKS
  TF_VAR_aks_kubernetes_version: ${{ vars.AKS_KUBERNETES_VERSION }}
  TF_VAR_aks_system_node_vm_size: ${{ vars.AKS_SYSTEM_NODE_VM_SIZE }}
  TF_VAR_aks_workload_node_vm_size: ${{ vars.AKS_WORKLOAD_NODE_VM_SIZE }}
  TF_VAR_aks_auto_scaling_enabled: ${{ vars.AKS_AUTO_SCALING_ENABLED }}
  TF_VAR_aks_os_disk_size_gb: ${{ vars.AKS_OS_DISK_SIZE_GB }}
  TF_VAR_aks_log_retention_days: ${{ vars.AKS_LOG_RETENTION_DAYS }}

jobs: 
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment}}

    defaults:
        run:
          shell: bash

    steps:

    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Login to Azure using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.azureClientId }}
        tenant-id: ${{ secrets.azureTenantId }}
        subscription-id: ${{ secrets.azureSubscriptionId }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Enable public access for backend storage account
      run: |
        az storage account update \
        --name "${{ vars.STORAGE_ACCOUNT }}" \
        --resource-group "${{ vars.RESOURCE_GROUP }}" \
        --public-network-access Enabled

        echo "Enabling public network access and waiting for 30 seconds."
        sleep 30

    - name: Terraform Init
      id: init
      run: |
        terraform -chdir="${{ vars.TERRAFORM_WORKING_DIRECTORY }}" init -upgrade -reconfigure \
        -backend-config="resource_group_name=${{ vars.RESOURCE_GROUP }}" \
        -backend-config="storage_account_name=${{ vars.STORAGE_ACCOUNT }}" \
        -backend-config="container_name=${{ vars.TERRAFORM_STATE_CONTAINER }}" \
        -backend-config="key=${{ vars.TERRAFORM_STATE_BLOB }}"
      env:
        ARM_CLIENT_ID: ${{ secrets.azureClientId }}
        ARM_TENANT_ID: ${{ secrets.azureTenantId }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.azureSubscriptionId }}
        ARM_USE_OIDC: true
        ARM_USE_AZUREAD: true

    - name: Import existing Entra users into state (idempotent)
      run: |
        cd "${{ vars.TERRAFORM_WORKING_DIRECTORY }}"
        DOMAIN=$(az rest --method GET --url "https://graph.microsoft.com/v1.0/domains" \
          --query "value[?isDefault].id" -o tsv 2>/dev/null || true)

        declare -A USERS=(
          ["emma"]="emma.wilson"
          ["james"]="james.chen"
          ["sarah"]="sarah.miller"
          ["david"]="david.park"
          ["lisa"]="lisa.torres"
        )

        for key in "${!USERS[@]}"; do
          UPN="${USERS[$key]}@${DOMAIN}"
          IN_STATE=$(terraform state list "module.entra.azuread_user.test[\"$key\"]" 2>/dev/null || true)
          if [ -z "$IN_STATE" ]; then
            OID=$(az ad user show --id "$UPN" --query id -o tsv 2>/dev/null || true)
            if [ -n "$OID" ]; then
              echo "Importing $UPN → state"
              terraform import "module.entra.azuread_user.test[\"$key\"]" "$OID" 2>/dev/null || true
            fi
          fi
        done
      env:
        ARM_CLIENT_ID: ${{ secrets.azureClientId }}
        ARM_TENANT_ID: ${{ secrets.azureTenantId }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.azureSubscriptionId }}
        ARM_USE_OIDC: true
        ARM_USE_AZUREAD: true

    - name: Download the plan
      uses: actions/download-artifact@v4
      with:
        name: tf-plan
        path: ${{ vars.TERRAFORM_WORKING_DIRECTORY }}/

    - name: Apply the plan
      id: apply
      run: terraform -chdir="${{ vars.TERRAFORM_WORKING_DIRECTORY }}" apply -auto-approve out.tfplan
      env:
        ARM_CLIENT_ID: ${{ secrets.azureClientId }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.azureSubscriptionId }}
        ARM_TENANT_ID: ${{ secrets.azureTenantId }}
        ARM_USE_OIDC: true
        ARM_USE_AZUREAD: true

    - name: Policy diagnostic (on apply failure)
      if: failure() && steps.apply.outcome == 'failure'
      run: |
        echo "::group::Azure Policy diagnostic"
        echo "Listing deny-effect policies that may have blocked resource creation..."
        echo ""

        SUB_ID=$(az account show --query id -o tsv)
        RG_SCOPE="/subscriptions/$SUB_ID/resourceGroups/${{ vars.RESOURCE_GROUP }}"
        SEEN_IDS=""

        for SCOPE_ARG in "--scope $RG_SCOPE" ""; do
          while IFS=$'\t' read -r ASSIGN_ID POLICY_NAME POLICY_DEF_ID ENFORCEMENT; do
            [ -z "$ASSIGN_ID" ] && continue
            [ "$ENFORCEMENT" != "Default" ] && continue
            echo "$SEEN_IDS" | grep -qF "$ASSIGN_ID" && continue
            SEEN_IDS="$SEEN_IDS $ASSIGN_ID"

            DEF_NAME=$(echo "$POLICY_DEF_ID" | awk -F'/' '{print $NF}')
            IS_INITIATIVE=$(echo "$POLICY_DEF_ID" | grep -c 'policySetDefinitions' || true)
            ASSIGN_EFFECT=$(az policy assignment show --name "$(echo "$ASSIGN_ID" | awk -F'/' '{print $NF}')" \
              --query "parameters.effect.value" -o tsv 2>/dev/null || true)
                if [[ "$M_EFFECT" == *"parameters"* ]]; then
                  if [ -n "$ASSIGN_EFFECT" ]; then
                    M_EFFECT="$ASSIGN_EFFECT"
                  else
                    M_DEFAULT=$(az policy definition show --name "$M_NAME" \
                      --query "parameters.effect.defaultValue" -o tsv 2>/dev/null || true)
                    [ -n "$M_DEFAULT" ] && M_EFFECT="$M_DEFAULT"
                  fi
                fi
                if [[ "${M_EFFECT,,}" == *"deny"* ]]; then
                  M_DISPLAY=$(az policy definition show --name "$M_NAME" \
                    --query "displayName" -o tsv 2>/dev/null || true)
                  echo "::error::DENY policy: $M_DISPLAY (initiative: $POLICY_NAME)"
                fi
              done <<< "$MEMBER_DEFS"
            else
              EFFECT=$(az policy definition show --name "$DEF_NAME" \
                --query "policyRule.then.effect" -o tsv 2>/dev/null || true)
              if [[ "$EFFECT" == *"parameters"* ]]; then
                if [ -n "$ASSIGN_EFFECT" ]; then
                  EFFECT="$ASSIGN_EFFECT"
                else
                  DEFAULT_EFFECT=$(az policy definition show --name "$DEF_NAME" \
                    --query "parameters.effect.defaultValue" -o tsv 2>/dev/null || true)
                  [ -n "$DEFAULT_EFFECT" ] && EFFECT="$DEFAULT_EFFECT"
                fi
              fi
              if [[ "${EFFECT,,}" == *"deny"* ]]; then
                echo "::error::DENY policy: $POLICY_NAME"
              fi
            fi
          done < <(az policy assignment list $SCOPE_ARG \
            --query "[].[id, displayName, policyDefinitionId, enforcementMode]" -o tsv 2>/dev/null || true)
        done

        echo ""
        echo "Fix your Terraform config to comply with the above policies, then re-run."
        echo "::endgroup::"

    - name: Disable public access for backend storage account
      if: always()
      run: |
        az storage account update \
        --name "${{ vars.STORAGE_ACCOUNT }}" \
        --resource-group "${{ vars.RESOURCE_GROUP }}" \
        --public-network-access Disabled