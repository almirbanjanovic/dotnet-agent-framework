name: Architecture Fitness

# Enforces two architectural fitness functions:
#   1. Component independence — zero ProjectReferences in src/ except AppHost.
#      → src-tests/Contoso.AppHost.Tests/ComponentIndependenceTests.cs
#      → src/README.md → "Architectural edict — component independence"
#   2. Local-dev template hygiene — no hardcoded Foundry endpoints / tenant IDs
#      in *.Local.json.template files (forces every developer onto one account).
#      → src-tests/Contoso.AppHost.Tests/LocalDevTemplateTests.cs
#
# This workflow MUST stay green on main.

on:
  pull_request:
    paths:
      - 'src/**/*.csproj'
      - 'src/AppHost/Program.cs'
      - 'src/**/appsettings.Local.json.template'
      - 'src-tests/Contoso.AppHost.Tests/**'
      - 'infra-tests/terraform/**'
      - 'infra/terraform/local-dev/**'
      - 'Directory.Packages.props'
      - 'global.json'
      - '.github/workflows/architecture-fitness.yml'
  push:
    branches: [main]
    paths:
      - 'src/**/*.csproj'
      - 'src/AppHost/Program.cs'
      - 'src/**/appsettings.Local.json.template'
      - 'src-tests/Contoso.AppHost.Tests/**'
      - 'infra-tests/terraform/**'
      - 'infra/terraform/local-dev/**'
      - 'Directory.Packages.props'
      - 'global.json'
      - '.github/workflows/architecture-fitness.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enforce-component-independence:
    name: Enforce component independence + template hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore src-tests/Contoso.AppHost.Tests/Contoso.AppHost.Tests.csproj

      - name: Run architecture fitness tests
        run: >
          dotnet test src-tests/Contoso.AppHost.Tests/Contoso.AppHost.Tests.csproj
          --no-restore
          --verbosity normal
          --logger "console;verbosity=detailed"

  infra-terraform-fitness:
    name: Run infra terraform fitness scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - name: Run bash terraform tests
        run: bash ./infra-tests/terraform/run-tests.sh
