name: Architecture Fitness

# Enforces the component-independence edict (zero ProjectReferences in src/
# except AppHost). This workflow MUST stay green on main.
#
# See: src-tests/Contoso.AppHost.Tests/ComponentIndependenceTests.cs
# See: src/README.md → "Architectural edict — component independence"

on:
  pull_request:
    paths:
      - 'src/**/*.csproj'
      - 'src-tests/Contoso.AppHost.Tests/**'
      - '.github/workflows/architecture-fitness.yml'
  push:
    branches: [main]
    paths:
      - 'src/**/*.csproj'
      - 'src-tests/Contoso.AppHost.Tests/**'
      - '.github/workflows/architecture-fitness.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enforce-component-independence:
    name: Enforce component independence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore src-tests/Contoso.AppHost.Tests/Contoso.AppHost.Tests.csproj

      - name: Run architecture fitness tests
        run: >
          dotnet test src-tests/Contoso.AppHost.Tests/Contoso.AppHost.Tests.csproj
          --no-restore
          --verbosity normal
          --logger "console;verbosity=detailed"
