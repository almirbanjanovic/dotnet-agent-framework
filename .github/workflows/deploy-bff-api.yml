name: Deploy BFF API

on:
  push:
    branches: [main]
    paths:
      - 'src/bff-api/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production
      region:
        description: 'Azure region'
        required: true
        default: 'eastus2'
        type: choice
        options:
          # United States
          - eastus
          - eastus2
          - centralus
          - northcentralus
          - southcentralus
          - westus
          - westus2
          - westus3
          # Canada
          - canadacentral
          - canadaeast
          # Brazil
          - brazilsouth
          # Europe
          - westeurope
          - northeurope
          # France
          - francecentral
          # Germany
          - germanywestcentral
          # Norway
          - norwayeast
          # Sweden
          - swedencentral
          # Switzerland
          - switzerlandnorth
          # United Kingdom
          - uksouth
          # Italy
          - italynorth
          # Spain
          - spaincentral
          # Asia Pacific
          - eastasia
          - southeastasia
          # Australia
          - australiaeast
          # Japan
          - japaneast
          # Korea
          - koreacentral
          # India
          - centralindia
          # UAE
          - uaenorth
          # Qatar
          - qatarcentral
          # South Africa
          - southafricanorth

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '9.0.x'
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  SERVICE_NAME: bff-api
  NAMESPACE: contoso

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/bff-api/Contoso.BffApi.csproj

      - name: Build
        run: dotnet build src/bff-api/Contoso.BffApi.csproj --no-restore -c Release

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/bff-api/Contoso.BffApi.csproj

      - name: Test
        run: dotnet test src-tests/Contoso.BffApi.Tests/Contoso.BffApi.Tests.csproj --no-restore --verbosity normal

  docker-build-push:
    runs-on: ubuntu-latest
    needs: test
    environment: ${{ inputs.environment || 'dev' }}
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
        env:
          AZURE_IDENTITY_DISABLE_CP1: "true"

      - name: ACR Login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          IMAGE="${{ vars.ACR_NAME }}.azurecr.io/${{ env.SERVICE_NAME }}:${{ steps.meta.outputs.version }}"
          docker build \
            -t "$IMAGE" \
            -f src/bff-api/Dockerfile \
            --build-arg BUILD_VERSION="${{ steps.meta.outputs.version }}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg VCS_REF="${{ github.sha }}" \
            .
          docker push "$IMAGE"

  helm-deploy:
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
        env:
          AZURE_IDENTITY_DISABLE_CP1: "true"

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --name aks-${{ vars.BASE_NAME }}-${{ vars.ENVIRONMENT }}-${{ vars.LOCATION }} \
            --overwrite-existing

      # Pull the AGC frontend FQDN from Key Vault so the BFF's CORS allowlist
      # matches the production hostname. The chart's `BlazorUi__Origin`
      # default is an intentionally invalid sentinel — this step MUST run
      # before helm upgrade.
      - name: Read BFF hostname from Key Vault
        id: kv
        run: |
          KV_NAME=$(az keyvault list \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --query "[0].name" -o tsv)
          if [ -z "$KV_NAME" ]; then
            echo "::error::No Key Vault found in resource group ${{ vars.RESOURCE_GROUP }}"
            exit 1
          fi
          BFF_HOSTNAME=$(az keyvault secret show --vault-name "$KV_NAME" \
            --name "Bff--Hostname" --query value -o tsv)
          if [ -z "$BFF_HOSTNAME" ]; then
            echo "::error::Key Vault secret Bff--Hostname is empty or missing"
            exit 1
          fi
          echo "bff_hostname=$BFF_HOSTNAME" >> $GITHUB_OUTPUT

      - name: Helm upgrade
        run: |
          helm upgrade --install ${{ env.SERVICE_NAME }} src/bff-api/chart/ \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set image.repository=${{ vars.ACR_NAME }}.azurecr.io/${{ env.SERVICE_NAME }} \
            --set image.tag=${{ needs.docker-build-push.outputs.image-tag }} \
            --set "config.BlazorUi__Origin=https://${{ steps.kv.outputs.bff_hostname }}" \
            --wait \
            --timeout 5m
