on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      azureClientId:
        required: true
      azureTenantId:
        required: true
      azureSubscriptionId:
        required: true
    outputs:
      deployer_ip:
        description: "Deployer public IP for firewall cleanup"
        value: ${{ jobs.terraform-plan.outputs.deployer_ip }}

env:
  TF_VAR_tags: ${{ vars.TAGS }}
  TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP }}
  TF_VAR_environment: ${{ vars.ENVIRONMENT }}
  TF_VAR_base_name: ${{ vars.BASE_NAME }}
  TF_VAR_location: ${{ vars.LOCATION }}
  # Foundry
  TF_VAR_cognitive_account_kind: ${{ vars.COGNITIVE_ACCOUNT_KIND }}
  TF_VAR_oai_sku_name: ${{ vars.OAI_SKU_NAME }}
  TF_VAR_oai_deployment_sku_name: ${{ vars.OAI_DEPLOYMENT_SKU_NAME }}
  TF_VAR_oai_deployment_model_format: ${{ vars.OAI_DEPLOYMENT_MODEL_FORMAT }}
  TF_VAR_oai_deployment_model_name: ${{ vars.OAI_DEPLOYMENT_MODEL_NAME }}
  TF_VAR_oai_deployment_model_version: ${{ vars.OAI_DEPLOYMENT_MODEL_VERSION }}
  TF_VAR_oai_version_upgrade_option: ${{ vars.OAI_VERSION_UPGRADE_OPTION }}
  TF_VAR_create_embedding_deployment: ${{ vars.CREATE_EMBEDDING_DEPLOYMENT }}
  TF_VAR_embedding_model_name: ${{ vars.EMBEDDING_MODEL_NAME }}
  TF_VAR_embedding_model_version: ${{ vars.EMBEDDING_MODEL_VERSION }}
  TF_VAR_embedding_sku_name: ${{ vars.EMBEDDING_SKU_NAME }}
  TF_VAR_embedding_capacity: ${{ vars.EMBEDDING_CAPACITY }}
  # Cosmos DB
  TF_VAR_cosmos_agents_database_name: ${{ vars.COSMOS_AGENTS_DATABASE_NAME }}
  TF_VAR_cosmos_agent_state_container_name: ${{ vars.COSMOS_AGENT_STATE_CONTAINER_NAME }}
  TF_VAR_cosmos_crm_database_name: ${{ vars.COSMOS_CRM_DATABASE_NAME }}
  # Storage
  # AI Search
  TF_VAR_search_sku: ${{ vars.SEARCH_SKU }}
  TF_VAR_search_index_name: ${{ vars.SEARCH_INDEX_NAME }}
  # ACR
  TF_VAR_create_acr: ${{ vars.CREATE_ACR }}
  TF_VAR_acr_sku: ${{ vars.ACR_SKU }}
  TF_VAR_acr_name: ${{ vars.ACR_NAME }}
  # AKS
  TF_VAR_aks_kubernetes_version: ${{ vars.AKS_KUBERNETES_VERSION }}
  TF_VAR_aks_system_node_vm_size: ${{ vars.AKS_SYSTEM_NODE_VM_SIZE }}
  TF_VAR_aks_workload_node_vm_size: ${{ vars.AKS_WORKLOAD_NODE_VM_SIZE }}
  TF_VAR_aks_auto_scaling_enabled: ${{ vars.AKS_AUTO_SCALING_ENABLED }}
  TF_VAR_aks_os_disk_size_gb: ${{ vars.AKS_OS_DISK_SIZE_GB }}
  TF_VAR_aks_log_retention_days: ${{ vars.AKS_LOG_RETENTION_DAYS }}

jobs: 
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment}}
    outputs:
      deployer_ip: ${{ steps.deployer.outputs.ip }}

    defaults:
        run:
          shell: bash

    steps:

    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Login to Azure using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.azureClientId }}
        tenant-id: ${{ secrets.azureTenantId }}
        subscription-id: ${{ secrets.azureSubscriptionId }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Get deployer IP
      id: deployer
      run: |
        DEPLOYER_IP=$(curl -s --max-time 10 https://api.ipify.org)
        echo "ip=$DEPLOYER_IP" >> "$GITHUB_OUTPUT"
        echo "Deployer IP: $DEPLOYER_IP"

    - name: Setup TFLint
      uses: terraform-linters/setup-tflint@v1
    
    - name: Terraform Format Check
      id: fmt
      run: terraform fmt -check
      continue-on-error: true  
    
    - name: Add deployer IP to backend storage firewall
      run: |
        az storage account network-rule add \
          --account-name "${{ vars.STORAGE_ACCOUNT }}" \
          --resource-group "${{ vars.RESOURCE_GROUP }}" \
          --ip-address "${{ steps.deployer.outputs.ip }}"

        echo "Waiting 30 seconds for firewall change to propagate."
        sleep 30


    - name: Terraform Init
      id: init
      run: |
        terraform -chdir="${{ vars.TERRAFORM_WORKING_DIRECTORY}}" init -upgrade -reconfigure \
        -backend-config="resource_group_name=${{ vars.RESOURCE_GROUP }}" \
        -backend-config="storage_account_name=${{ vars.STORAGE_ACCOUNT }}" \
        -backend-config="container_name=${{ vars.TERRAFORM_STATE_CONTAINER }}" \
        -backend-config="key=${{ vars.TERRAFORM_STATE_BLOB }}"
      env:
        ARM_CLIENT_ID: ${{ secrets.azureClientId }}
        ARM_TENANT_ID: ${{ secrets.azureTenantId }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.azureSubscriptionId }}
        ARM_USE_OIDC: true
        ARM_USE_AZUREAD: true

    - name: Terraform Validate
      id: validate
      run: terraform -chdir="${{ vars.TERRAFORM_WORKING_DIRECTORY }}" validate

    - name: Init TFLint
      run: tflint --init
      working-directory: ${{ vars.TERRAFORM_WORKING_DIRECTORY }}

    - name: Run TFLint
      run: tflint -f compact
      working-directory: ${{ vars.TERRAFORM_WORKING_DIRECTORY }}

    - name: Terraform plan
      id: plan
      run: terraform -chdir="${{ vars.TERRAFORM_WORKING_DIRECTORY}}" plan --out=out.tfplan
      env:
        ARM_CLIENT_ID: ${{ secrets.azureClientId }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.azureSubscriptionId }}
        ARM_TENANT_ID: ${{ secrets.azureTenantId }}
        ARM_USE_OIDC: true  
        ARM_USE_AZUREAD: true

    - name: Upload the plan
      uses: actions/upload-artifact@v4
      with:
        name: tf-plan
        path: ${{ vars.TERRAFORM_WORKING_DIRECTORY}}/out.tfplan