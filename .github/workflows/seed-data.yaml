on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      azureClientId:
        required: true
      azureTenantId:
        required: true
      azureSubscriptionId:
        required: true
    outputs:
      deployer_ip:
        description: "Deployer public IP for firewall cleanup"
        value: ${{ jobs.seed-data.outputs.deployer_ip }}

jobs:
  seed-data:
    name: Seed CRM Data
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      deployer_ip: ${{ steps.deployer.outputs.ip }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Login to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.azureClientId }}
          tenant-id: ${{ secrets.azureTenantId }}
          subscription-id: ${{ secrets.azureSubscriptionId }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Add deployer IP to resource firewalls
        id: deployer
        run: |
          DEPLOYER_IP=$(curl -s --max-time 10 https://api.ipify.org)
          echo "ip=$DEPLOYER_IP" >> "$GITHUB_OUTPUT"
          RG="${{ vars.RESOURCE_GROUP }}"

          # Key Vault
          for kv in $(az keyvault list --resource-group "$RG" --query "[].name" -o tsv 2>/dev/null); do
            az keyvault network-rule add --name "$kv" --ip-address "$DEPLOYER_IP/32" 2>/dev/null || true
          done

          # SQL Server
          for sql in $(az sql server list --resource-group "$RG" --query "[].name" -o tsv 2>/dev/null); do
            az sql server update --name "$sql" --resource-group "$RG" --enable-public-network true 2>/dev/null || true
            az sql server firewall-rule create --server "$sql" --resource-group "$RG" --name AllowDeployer \
              --start-ip-address "$DEPLOYER_IP" --end-ip-address "$DEPLOYER_IP" 2>/dev/null || true
          done

          echo "Deployer IP $DEPLOYER_IP added to firewalls"

      - name: Discover Key Vault name
        id: keyvault
        run: |
          KV_NAME=$(az keyvault list \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --query "[0].name" -o tsv)
          echo "name=$KV_NAME" >> "$GITHUB_OUTPUT"

      - name: Read SQL connection info from Key Vault
        id: sql
        run: |
          KV="${{ steps.keyvault.outputs.name }}"
          echo "server=$(az keyvault secret show --vault-name "$KV" --name SQL-SERVER-FQDN --query value -o tsv)" >> "$GITHUB_OUTPUT"
          echo "database=$(az keyvault secret show --vault-name "$KV" --name SQL-DATABASE-NAME --query value -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Get SQL access token
        id: sqltoken
        run: |
          TOKEN=$(az account get-access-token --resource https://database.windows.net/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Seed CRM data
        run: dotnet run --project src/seed-data
        env:
          SQL_SERVER_FQDN: ${{ steps.sql.outputs.server }}
          SQL_DATABASE_NAME: ${{ steps.sql.outputs.database }}
          SQL_ACCESS_TOKEN: ${{ steps.sqltoken.outputs.token }}

      - name: Link Entra users to Customers table
        run: |
          KV="${{ steps.keyvault.outputs.name }}"
          SERVER="${{ steps.sql.outputs.server }}"
          DB="${{ steps.sql.outputs.database }}"
          TOKEN="${{ steps.sqltoken.outputs.token }}"

          declare -A CUSTOMERS=(
            ["101"]="CUSTOMER-EMMA-ENTRA-OID"
            ["102"]="CUSTOMER-JAMES-ENTRA-OID"
            ["103"]="CUSTOMER-SARAH-ENTRA-OID"
            ["104"]="CUSTOMER-DAVID-ENTRA-OID"
            ["105"]="CUSTOMER-LISA-ENTRA-OID"
          )

          for CID in "${!CUSTOMERS[@]}"; do
            SECRET_NAME="${CUSTOMERS[$CID]}"
            OID=$(az keyvault secret show --vault-name "$KV" --name "$SECRET_NAME" --query value -o tsv 2>/dev/null || true)
            if [ -n "$OID" ]; then
              SAFE_OID="${OID//\'/\'\'}"
              SAFE_CID="${CID//\'/\'\'}"
              sqlcmd -S "tcp:${SERVER},1433" -d "$DB" --authentication-method=ActiveDirectoryAccessToken -P "$TOKEN" \
                -Q "UPDATE Customers SET entra_id = '${SAFE_OID}' WHERE id = '${SAFE_CID}'" -C 2>/dev/null || true
              echo "Linked customer $CID → ${OID:0:8}..."
            else
              echo "Warning: Could not read $SECRET_NAME from Key Vault"
            fi
          done
