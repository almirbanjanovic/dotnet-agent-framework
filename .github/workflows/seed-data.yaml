on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      azureClientId:
        required: true
      azureTenantId:
        required: true
      azureSubscriptionId:
        required: true
    outputs:
      deployer_ip:
        description: "Deployer public IP for firewall cleanup"
        value: ${{ jobs.seed-data.outputs.deployer_ip }}

jobs:
  seed-data:
    name: Seed CRM Data
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      deployer_ip: ${{ steps.deployer.outputs.ip }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Login to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.azureClientId }}
          tenant-id: ${{ secrets.azureTenantId }}
          subscription-id: ${{ secrets.azureSubscriptionId }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Add deployer IP to resource firewalls
        id: deployer
        run: |
          DEPLOYER_IP=$(curl -s --max-time 10 https://api.ipify.org)
          echo "ip=$DEPLOYER_IP" >> "$GITHUB_OUTPUT"
          RG="${{ vars.RESOURCE_GROUP }}"

          # Key Vault
          for kv in $(az keyvault list --resource-group "$RG" --query "[].name" -o tsv 2>/dev/null); do
            az keyvault network-rule add --name "$kv" --ip-address "$DEPLOYER_IP/32" 2>/dev/null || true
          done

          # Cosmos DB
          for c in $(az cosmosdb list --resource-group "$RG" --query "[].name" -o tsv 2>/dev/null); do
            EXISTING=$(az cosmosdb show --name "$c" --resource-group "$RG" --query "ipRules[].ipAddressOrRange" -o tsv 2>/dev/null || true)
            CURRENT_IPS=$(echo "$EXISTING" | paste -sd, - 2>/dev/null || true)
            if [ -n "$CURRENT_IPS" ]; then
              az cosmosdb update --name "$c" --resource-group "$RG" --ip-range-filter "${CURRENT_IPS},${DEPLOYER_IP}" 2>/dev/null || true
            else
              az cosmosdb update --name "$c" --resource-group "$RG" --ip-range-filter "$DEPLOYER_IP" 2>/dev/null || true
            fi
          done

          echo "Deployer IP $DEPLOYER_IP added to firewalls"

      - name: Discover Key Vault name
        id: keyvault
        run: |
          KV_NAME=$(az keyvault list \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --query "[0].name" -o tsv)
          echo "name=$KV_NAME" >> "$GITHUB_OUTPUT"

      - name: Read Cosmos DB CRM connection info from Key Vault
        id: cosmos
        run: |
          KV="${{ steps.keyvault.outputs.name }}"
          echo "endpoint=$(az keyvault secret show --vault-name "$KV" --name COSMOSDB-CRM-ENDPOINT --query value -o tsv)" >> "$GITHUB_OUTPUT"
          echo "database=$(az keyvault secret show --vault-name "$KV" --name COSMOSDB-CRM-DATABASE --query value -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Grant OIDC SP Cosmos DB data-plane access
        run: |
          SP_OID=$(az ad sp show --id "${{ secrets.azureClientId }}" --query id -o tsv)
          RG="${{ vars.RESOURCE_GROUP }}"
          for ACCT in $(az cosmosdb list --resource-group "$RG" --query "[].name" -o tsv 2>/dev/null); do
            az cosmosdb sql role assignment create \
              --account-name "$ACCT" \
              --resource-group "$RG" \
              --role-definition-id "00000000-0000-0000-0000-000000000001" \
              --principal-id "$SP_OID" \
              --scope "/" 2>/dev/null || true
          done

      - name: Seed CRM data (uses DefaultAzureCredential — no key needed)
        run: dotnet run --project src/seed-data
        env:
          CosmosDb__Endpoint: ${{ steps.cosmos.outputs.endpoint }}
          CosmosDb__DatabaseName: ${{ steps.cosmos.outputs.database }}

      - name: Link Entra users to Customers
        run: |
          KV="${{ steps.keyvault.outputs.name }}"

          declare -A CUSTOMERS=(
            ["101"]="CUSTOMER-EMMA-ENTRA-OID"
            ["102"]="CUSTOMER-JAMES-ENTRA-OID"
            ["103"]="CUSTOMER-SARAH-ENTRA-OID"
            ["104"]="CUSTOMER-DAVID-ENTRA-OID"
            ["105"]="CUSTOMER-LISA-ENTRA-OID"
          )

          ENTRA_PAIRS=""
          for CID in "${!CUSTOMERS[@]}"; do
            SECRET_NAME="${CUSTOMERS[$CID]}"
            OID=$(az keyvault secret show --vault-name "$KV" --name "$SECRET_NAME" --query value -o tsv 2>/dev/null || true)
            if [ -n "$OID" ]; then
              if [ -n "$ENTRA_PAIRS" ]; then ENTRA_PAIRS="${ENTRA_PAIRS};"; fi
              ENTRA_PAIRS="${ENTRA_PAIRS}${CID}=${OID}"
              echo "Linked customer $CID → ${OID:0:8}..."
            else
              echo "Warning: Could not read $SECRET_NAME from Key Vault"
            fi
          done

          ENTRA_MAPPING="$ENTRA_PAIRS" dotnet run --project src/seed-data
        env:
          CosmosDb__Endpoint: ${{ steps.cosmos.outputs.endpoint }}
          CosmosDb__DatabaseName: ${{ steps.cosmos.outputs.database }}
          CRM_DATA_PATH: /dev/null
