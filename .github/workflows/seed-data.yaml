on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      azureClientId:
        required: true
      azureTenantId:
        required: true
      azureSubscriptionId:
        required: true

jobs:
  seed-data:
    name: Seed CRM Data
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Login to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.azureClientId }}
          tenant-id: ${{ secrets.azureTenantId }}
          subscription-id: ${{ secrets.azureSubscriptionId }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Discover Key Vault name
        id: keyvault
        run: |
          KV_NAME=$(az keyvault list \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --query "[0].name" -o tsv)
          echo "name=$KV_NAME" >> "$GITHUB_OUTPUT"

      - name: Read SQL secrets from Key Vault
        id: sql
        run: |
          KV="${{ steps.keyvault.outputs.name }}"
          echo "server=$(az keyvault secret show --vault-name "$KV" --name SQL-SERVER-FQDN --query value -o tsv)" >> "$GITHUB_OUTPUT"
          echo "database=$(az keyvault secret show --vault-name "$KV" --name SQL-DATABASE-NAME --query value -o tsv)" >> "$GITHUB_OUTPUT"
          echo "login=$(az keyvault secret show --vault-name "$KV" --name SQL-ADMIN-LOGIN --query value -o tsv)" >> "$GITHUB_OUTPUT"
          PASSWORD=$(az keyvault secret show --vault-name "$KV" --name SQL-ADMIN-PASSWORD --query value -o tsv)
          echo "::add-mask::$PASSWORD"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Seed CRM data
        run: dotnet run --project src/seed-data
        env:
          SQL_SERVER_FQDN: ${{ steps.sql.outputs.server }}
          SQL_DATABASE_NAME: ${{ steps.sql.outputs.database }}
          SQL_ADMIN_LOGIN: ${{ steps.sql.outputs.login }}
          SQL_ADMIN_PASSWORD: ${{ steps.sql.outputs.password }}
