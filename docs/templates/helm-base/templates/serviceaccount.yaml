{{/*
Service accounts for Contoso services are normally pre-provisioned by Terraform
(infra/terraform/manifests/service-account.yaml) with workload identity annotations.
This template is provided for local/test clusters where Terraform is not used.
Set serviceAccount.create=true in values.yaml to enable.
*/}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "service.serviceAccountName" . }}
  namespace: {{ include "service.namespace" . }}
  labels:
    {{- include "service.labels" . | nindent 4 }}
    azure.workload.identity/use: "true"
  annotations:
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: true
{{- end }}
